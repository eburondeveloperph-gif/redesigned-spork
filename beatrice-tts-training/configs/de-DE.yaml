# Kokoro German TTS Training Config
# Milestone 2 — German Prototype

model:
  base_checkpoint: "hexgrad/Kokoro-82M"
  output_name: "kokoro-de-DE-beatrice"
  device: "auto"
  # German community recipe reference:
  # https://github.com/semidark/kokoro-deutsch

data:
  language: "de-DE"
  speaker_id: "beatrice_de_de_001"
  raw_dir: "datasets/raw/de-DE"
  processed_dir: "datasets/processed/de-DE"
  manifest_path: "datasets/manifests/de-DE_manifest.json"
  
  target_sample_rate: 24000
  target_channels: 1
  target_bit_depth: 16
  max_duration_seconds: 15.0
  min_duration_seconds: 1.0
  
  train_ratio: 0.85
  val_ratio: 0.10
  test_ratio: 0.05
  
  augment: false
  pitch_shift_range: [-1.5, 1.5]
  speed_range: [0.95, 1.05]

training:
  batch_size: 16
  learning_rate: 2.0e-4
  num_epochs: 200
  warmup_epochs: 10
  gradient_clip_val: 1.0
  
  save_every_n_epochs: 10
  keep_last_n_checkpoints: 5
  
  log_every_n_steps: 50
  sample_every_n_epochs: 5
  num_sample_texts: 5
  
  optimizer: "adamw"
  weight_decay: 0.01
  betas: [0.9, 0.999]
  
  scheduler: "cosine_with_restarts"
  eta_min: 1.0e-6
  
  mel_loss_weight: 1.0
  dur_loss_weight: 0.5
  pitch_loss_weight: 0.5

phonemization:
  backend: "espeak"
  language_code: "de"
  preserve_punctuation: true
  stress_marks: false

normalization:
  module: "phonemizers.german.normalize_de_de"
  handle_numbers: true
  handle_dates: true
  handle_currency: true
  handle_phone_numbers: true
  handle_abbreviations: true
  # German-specific
  handle_compound_words: true
  umlaut_expansion: false  # keep äöü as-is in phonemization

evaluation:
  test_phrases_path: "eval/de-DE.txt"
  metrics:
    - "mel_cepstral_distortion"
    - "fundamental_frequency_rmse"
    - "word_error_rate"
  naturalness_scale: 1-5
  intelligibility_scale: 1-5
  speaker_similarity_scale: 1-5

export:
  format: "onnx"
  include_voicepack: true
  sample_rate: 24000
  quantization: false

metadata:
  version: "0.1.0"
  status: "beta"
  description: "Beatrice German voice based on Kokoro-82M"
  created_by: "Hermes CLI Agent"
  license: "Apache-2.0"
